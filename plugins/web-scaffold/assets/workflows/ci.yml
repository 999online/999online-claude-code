name: CI

on:
  pull_request:
  push:
    branches: [{{DEFAULT_BRANCH}}]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '{{NODE_VERSION}}'
          cache: npm
      - name: Install
        run: npm ci
      - name: Check
        run: npm run check
